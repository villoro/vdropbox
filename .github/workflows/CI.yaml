name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre_commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - uses: j178/prek-action@v1

  check_version:
    runs-on: ubuntu-latest
    steps:
    -  uses: villoro/vhooks/check_version@1.0.0
